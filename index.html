<!doctype html>
<html>
  <head></head>
  <body>
    <!script "Alert" if JS blocked/not found>
    <script>
      (function () {
      var script = document.createElement('script');
      // Path to script (choosing script)
        script.src = 'volumeSync.js';
        script.src = 'scroll.js';
        script.src = 'SAP.js';
        script.src = 'textHover.js';
        script.src = 'sort.js';

        script.onload = function () {
        };

        script.onerror = function () {
          // Alert message
          alert("Error! JS not found / doesn't work. Try allow JS in JS blocker");
        };

        document.head.appendChild(script);
      }());
    </script>
  </body>
</html>
